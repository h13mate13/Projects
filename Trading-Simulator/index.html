<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rishi Sharma - Portfolio</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <header class="header">
        <h1>Rishi Sharma</h1>
        <nav>
            <a href="#about">About</a>
            <a href="#projects">Projects</a>
            <a href="#contact">Contact</a>
        </nav>
    </header>

    <main>
        <section class="hero">
            <h2>Hi, I’m learning web development</h2>
            <p>I build simple, fast websites.</p>
            <a class="btn" href="#contact">Contact me</a>
        </section>
        <section id="about" class="section">
            <h3>About</h3>
            <p>Write a few sentences about yourself here.</p>
        </section>

        <section id="projects" class="section">
            <h3>Projects</h3>
            <div class="cards">
                <div class="card">
                    <h4>Project One</h4>
                    <p>Describe your project.</p>
                </div>
                <div class="card">
                    <h4>Project Two</h4>
                    <p>Describe your project.</p>
                </div>
            </div>
        </section>

        <section id="contact" class="section">
            <h3>Contact</h3>
            <form id="contactForm">
                <input type="text" name="name" placeholder="Your Name" required />
                <input type="email" name="email" placeholder="Your email" required />
                <textarea name="message" placeholder="Your message" required></textarea>
                <button class="btn" type="submit">Send</button>
            </form>
            <p id="status"></p>
        </section>
    </main>

    <footer class="footer">
        <p>© <span id="year"></span> Rishi Sharma</p>
    </footer>

    <script src="script.js"></script>
</body>

</html>
